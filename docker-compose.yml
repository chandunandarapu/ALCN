version: '3.9'

services:

  web:
    build: .
    container_name: django_app

    command: python backend/manage.py runserver 0.0.0.0:8000

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - redis

  redis:
    image: redis:latest

    container_name: redis_server

    ports:
      - "6379:6379"